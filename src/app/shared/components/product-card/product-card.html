<div class="card" [routerLink]="['/product', product.id]">

  <div class="badge-container" *ngIf="product.tags?.length">
    <span
      *ngFor="let tag of product.tags"
      [ngClass]="tag.toLowerCase()">
      {{ tag }}
    </span>
  </div>

  <img [src]="product.image" [alt]="product.name" />

  <h3>{{ product.name }}</h3>
  <p>₹{{ product.price }}</p>

  <button>Add to Cart</button>

</div>
