<section class="hero">
  <div class="hero-content">
    <h1>Freshly Baked Happiness</h1>
    <p>
      Homemade breads, cakes & healthy delights crafted with love.
    </p>
    <button routerLink="/menu">Explore Menu</button>
  </div>
</section>

<section class="featured-section">
  <h2>Our Specialties</h2>

  <div class="category-grid">
    <div class="category-card">
      <h3>Breads</h3>
      <p>Freshly baked everyday</p>
    </div>

    <div class="category-card">
      <h3>Seasonal Cakes</h3>
      <p>Mango, Pineapple & more</p>
    </div>

    <div class="category-card">
      <h3>Healthy Options</h3>
      <p>Guilt-free indulgence</p>
    </div>
  </div>
</section>

<section class="featured-products">
  <h2>Featured Products</h2>

  <div class="featured-grid">
    <app-product-card
      *ngFor="let product of featuredProducts"
      [product]="product">
    </app-product-card>
  </div>
</section>

<section class="cta-strip">
  <h2>Order Fresh. Eat Happy.</h2>
  <button routerLink="/menu">Shop Now</button>
</section>
