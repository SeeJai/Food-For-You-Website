<div class="cart-container">

  <h2>Your Cart</h2>

  <div *ngIf="cartService.getCartItems().length === 0">
    Cart is empty.
  </div>

  <div
    class="cart-item"
    *ngFor="let item of cartService.getCartItems()">

    <img [src]="item.image" />

    <div>
      <h3>{{ item.name }}</h3>
      <p>₹{{ item.price }} x {{ item.quantity }}</p>
    </div>

    <button (click)="remove(item.productId)">Remove</button>

  </div>

  <h3>Total: ₹{{ cartService.getTotalAmount() }}</h3>

</div>
